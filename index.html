<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsover OS</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <div class="login-logo">
                <svg width="48" height="48" viewBox="0 0 20 20" fill="none">
                    <rect x="1" y="1" width="8" height="8" rx="1.5" fill="currentColor"/>
                    <rect x="11" y="1" width="8" height="8" rx="1.5" fill="currentColor"/>
                    <rect x="1" y="11" width="8" height="8" rx="1.5" fill="currentColor"/>
                    <rect x="11" y="11" width="8" height="8" rx="1.5" fill="currentColor"/>
                </svg>
            </div>
            <h1 class="login-title">Bolsover OS</h1>
            <p class="login-subtitle">Construction Management Platform</p>
            <form id="login-form" class="login-form">
                <input type="email" id="login-email" placeholder="Email" required autocomplete="email">
                <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
                <button type="submit" id="login-btn">Sign In</button>
                <div id="login-error" class="login-error hidden"></div>
            </form>
        </div>
    </div>

    <!-- Desktop -->
    <div id="desktop" class="hidden">
        <div id="desktop-icons"></div>
        <div id="windows-container"></div>
        <div id="context-menu" class="context-menu hidden">
            <div class="context-item" data-action="change-wallpaper">Change Wallpaper</div>
            <div class="context-item" data-action="new-folder">New Folder</div>
            <div class="context-divider"></div>
            <div class="context-item" data-action="refresh">Refresh</div>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar" class="hidden">
        <button id="start-button">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <rect x="1" y="1" width="8" height="8" rx="1.5" fill="currentColor"/>
                <rect x="11" y="1" width="8" height="8" rx="1.5" fill="currentColor"/>
                <rect x="1" y="11" width="8" height="8" rx="1.5" fill="currentColor"/>
                <rect x="11" y="11" width="8" height="8" rx="1.5" fill="currentColor"/>
            </svg>
        </button>
        <div id="taskbar-windows"></div>
        <div id="system-tray">
            <div id="clock"></div>
        </div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu" class="hidden">
        <div id="start-menu-header">
            <span>Bolsover OS</span>
        </div>
        <div id="start-menu-apps"></div>
        <div id="start-menu-footer">
            <button id="start-power" title="Sign out">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/windowManager.js"></script>
    <script src="js/taskbar.js"></script>
    <script src="js/apps/terminal.js"></script>
    <script src="js/apps/notepad.js"></script>
    <script src="js/apps/dashboard.js"></script>
    <script src="js/apps/projects.js"></script>
    <script src="js/apps/clients.js"></script>
    <script src="js/apps/subcontractors.js"></script>
    <script src="js/apps/enquiries.js"></script>
    <script src="js/apps/settings.js"></script>
    <script src="js/desktop.js"></script>

    <script>
        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('login-error');

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errorEl.classList.add('hidden');

            try {
                await SupabaseClient.signIn(email, password);
            } catch (err) {
                errorEl.textContent = err.message || 'Invalid credentials';
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
